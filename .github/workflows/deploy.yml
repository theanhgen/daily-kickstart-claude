name: Deploy site

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Restore previously-rendered preview images so each deploy only renders
      # haikus added since the last haiku.txt change (slugs are immutable).
      - name: Cache preview images
        uses: actions/cache@v4
        with:
          path: site/h
          key: og-images-${{ hashFiles('haiku.txt') }}
          restore-keys: og-images-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Pillow
        run: python3 -m pip install --quiet pillow

      - name: Build site (json, permalinks, preview images)
        run: python3 scripts/build-site.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - uses: actions/deploy-pages@v4
        id: deployment
